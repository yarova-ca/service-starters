# ════════════════════════════════════════════════════════════════════
# Stage 05 — Test  |  07 Streaming SSR — Next.js App Router 16
# Runs on: every push and pull_request to main
# Copy to: .github/workflows/ in your Next.js App Router repo
# ════════════════════════════════════════════════════════════════════

name: "05 Test — Next.js App Router 16"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: actions/checkout@v4
      - name: Run tests
        run: npm test -- --coverage --coverageReporters=lcov

      # ── OPTIONAL: Codecov coverage upload ─────────────────────────
