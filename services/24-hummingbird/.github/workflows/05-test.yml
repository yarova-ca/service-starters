# ════════════════════════════════════════════════════════════════════
# Stage 05 — Test  |  24 Swift Server — Hummingbird 2.0
# Runs on: every push and pull_request to main
# Copy to: .github/workflows/ in your Hummingbird repo
# ════════════════════════════════════════════════════════════════════

name: "05 Test — Hummingbird 2.0"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.0'
      - uses: actions/checkout@v4
      - name: Run tests
        run: swift test --enable-code-coverage

      # ── OPTIONAL: Codecov coverage upload ─────────────────────────
