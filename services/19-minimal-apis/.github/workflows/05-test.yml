# ════════════════════════════════════════════════════════════════════
# Stage 05 — Test  |  19 .NET — Minimal APIs .NET 9
# Runs on: every push and pull_request to main
# Copy to: .github/workflows/ in your Minimal APIs .NET repo
# ════════════════════════════════════════════════════════════════════

name: "05 Test — Minimal APIs .NET 9"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'
      - uses: actions/checkout@v4
      - name: Run tests
        run: dotnet test --collect:"XPlat Code Coverage"

