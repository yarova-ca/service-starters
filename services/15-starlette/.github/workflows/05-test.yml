# ════════════════════════════════════════════════════════════════════
# Stage 05 — Test  |  15 Python — Starlette 0.41
# Runs on: every push and pull_request to main
# Copy to: .github/workflows/ in your Starlette repo
# ════════════════════════════════════════════════════════════════════

name: "05 Test — Starlette 0.41"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - uses: actions/checkout@v4
      - name: Run tests
        run: pytest --cov=. --cov-report=xml

      # ── OPTIONAL: Codecov coverage upload ─────────────────────────
