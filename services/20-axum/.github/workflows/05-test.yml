# ════════════════════════════════════════════════════════════════════
# Stage 05 — Test  |  20 Rust — Axum 0.8
# Runs on: every push and pull_request to main
# Copy to: .github/workflows/ in your Axum repo
# ════════════════════════════════════════════════════════════════════

name: "05 Test — Axum 0.8"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/checkout@v4
      - name: Run tests
        run: cargo test --workspace

