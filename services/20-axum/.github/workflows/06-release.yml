# ════════════════════════════════════════════════════════════════════
# Stage 06 — Release  |  20 Rust — Axum 0.8
# Runs on: push to main only
# Default: semantic-release (reads commit messages for version bump)
# Copy to: .github/workflows/ in your Axum repo
# ════════════════════════════════════════════════════════════════════

name: "06 Release — Axum 0.8"

on:
  push:
    branches: [main]

permissions:
  contents: write  # needed to create tags and GitHub releases
  id-token: write
  packages: write

jobs:

  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required for semantic-release

      # ── DEFAULT: semantic-release ─────────────────────────────────
      - name: Semantic release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
