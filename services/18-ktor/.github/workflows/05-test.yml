# ════════════════════════════════════════════════════════════════════
# Stage 05 — Test  |  18 Kotlin — Ktor 3.5
# Runs on: every push and pull_request to main
# Copy to: .github/workflows/ in your Ktor repo
# ════════════════════════════════════════════════════════════════════

name: "05 Test — Ktor 3.5"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      - uses: actions/checkout@v4
      - name: Run tests
        run: ./gradlew test

