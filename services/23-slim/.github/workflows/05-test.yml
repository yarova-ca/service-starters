# ════════════════════════════════════════════════════════════════════
# Stage 05 — Test  |  23 PHP — Slim 4.14
# Runs on: every push and pull_request to main
# Copy to: .github/workflows/ in your Slim repo
# ════════════════════════════════════════════════════════════════════

name: "05 Test — Slim 4.14"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
      - uses: actions/checkout@v4
      - name: Run tests
        run: vendor/bin/phpunit --coverage-clover coverage.xml

      # ── OPTIONAL: Codecov coverage upload ─────────────────────────
