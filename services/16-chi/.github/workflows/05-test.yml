# ════════════════════════════════════════════════════════════════════
# Stage 05 — Test  |  16 Go — Chi 5.2
# Runs on: every push and pull_request to main
# Copy to: .github/workflows/ in your Chi repo
# ════════════════════════════════════════════════════════════════════

name: "05 Test — Chi 5.2"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - uses: actions/checkout@v4
      - name: Run tests
        run: go test ./... -coverprofile=coverage.out

