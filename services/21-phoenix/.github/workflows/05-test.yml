# ════════════════════════════════════════════════════════════════════
# Stage 05 — Test  |  21 Elixir/BEAM — Phoenix 1.7
# Runs on: every push and pull_request to main
# Copy to: .github/workflows/ in your Phoenix repo
# ════════════════════════════════════════════════════════════════════

name: "05 Test — Phoenix 1.7"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.17'
          otp-version: '27'
      - uses: actions/checkout@v4
      - name: Run tests
        run: mix test --cover

